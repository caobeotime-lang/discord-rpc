name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pypresence pywin32 psutil colorama pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --console --name DiscordRPC discord_rpc_windows.py

      - uses: actions/upload-artifact@v4
        with:
          name: DiscordRPC-exe
          path: dist/DiscordRPC.exe
